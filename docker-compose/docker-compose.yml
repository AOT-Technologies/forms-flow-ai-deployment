version: '3.7'

services:
  nginx:
    image: nginx
    volumes:
      - ./configuration/conf.d/nginx.conf:/etc/nginx/nginx.conf
    ports:
      - "80:80" # Expose Nginx on port 80
    depends_on:
      - forms-flow-web
      - forms-flow-webapi
      - forms-flow-forms
      - forms-flow-bpm
      - keycloak
    networks:
      - internal

  forms-flow-web:
    image: formsflow/forms-flow-web:v6.0.1
    environment:
      - API_URL=http://nginx
      - FORMSFLOW_API_URL=http://nginx/api
    networks:
      - internal

  forms-flow-webapi:
    image: formsflow/forms-flow-webapi:v6.0.1
    environment:
      - FORMSFLOW_API_DB_URL=postgresql://postgres:changeme@forms-flow-webapi-db:5432/webapi
    networks:
      - internal

  forms-flow-forms:
    image: formsflow/forms-flow-forms:v6.0.0
    environment:
      - FORMIO_DEFAULT_PROJECT_URL=http://nginx/forms
    networks:
      - internal

  forms-flow-bpm:
    image: formsflow/forms-flow-bpm:v6.0.1
    environment:
      - BPM_API_URL=http://nginx/camunda
      - CAMUNDA_JDBC_DB_NAME=formsflow-bpm
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.7
    ports:
      - "8080:8080" # Expose Keycloak on port 8080
    environment:
      - KEYCLOAK_USER=admin
      - KEYCLOAK_PASSWORD=admin
      - KEYCLOAK_URL=http://nginx/auth
    networks:
      - internal

networks:
  internal:
    driver: bridge
