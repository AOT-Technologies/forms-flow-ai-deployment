version: '3.7'

services:
  nginx:
    image: nginx:stable-alpine
    container_name: nginx-proxy
    volumes:
      - ./configuration/conf.d/nginx.conf:/etc/nginx/nginx.conf:ro  # Updated path to nginx.conf
    restart: unless-stopped
    depends_on:
      - forms-flow-web
    networks:
      - formsflow
    ports:
      - "80:80"

  forms-flow-web:
    image: formsflow/forms-flow-web:v6.0.1
    environment:
      - API_URL=http://nginx
      - FORMSFLOW_API_URL=http://nginx/api
    networks:
      - internal

  forms-flow-webapi:
    image: formsflow/forms-flow-webapi:v6.0.1
    environment:
      - FORMSFLOW_API_DB_URL=postgresql://postgres:changeme@forms-flow-webapi-db:5432/webapi
    networks:
      - internal

  forms-flow-forms:
    image: formsflow/forms-flow-forms:v6.0.0
    environment:
      - FORMIO_DEFAULT_PROJECT_URL=http://nginx/forms
    networks:
      - internal

  forms-flow-bpm:
    image: formsflow/forms-flow-bpm:v6.0.1
    environment:
      - BPM_API_URL=http://nginx/camunda
      - CAMUNDA_JDBC_DB_NAME=formsflow-bpm
    networks:
      - internal

  keycloak:
    image: quay.io/keycloak/keycloak:latest  # Updated Keycloak image
    container_name: keycloak
    environment:
      - KEYCLOAK_USER=admin
      - KEYCLOAK_PASSWORD=changeme
    networks:
      - formsflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/auth/realms/master"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

networks:
  internal:
    driver: bridge
