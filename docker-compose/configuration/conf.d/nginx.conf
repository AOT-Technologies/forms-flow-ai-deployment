server {
    listen 80;
    server_name _;  # Catch all server name

    # Root for the main site (if needed)
    root /var/www/html;

    # Configuration for formsflow-web
    location /web {
        proxy_pass http://forms-flow-web:8080;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # Configuration for formsflow-webapi
    location /api {
        proxy_pass http://forms-flow-webapi:5001;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Configuration for formsflow-forms
    location /forms {
        proxy_pass http://forms-flow-forms:3001;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Configuration for Camunda BPM (formsflow-bpm)
    location /camunda {
        proxy_pass http://forms-flow-bpm:8080;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    # Configuration for Keycloak
    location /auth {
        proxy_pass http://keycloak:8080/auth;
        proxy_set_header Host $host:$server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}